name: Update profile card

on:
  schedule:
    - cron: "23 8 * * *" # daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r cache/requirements.txt

      - name: Regenerate SVGs
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN || github.token }}
          USER_NAME: 5hristian
        run: python today.py

      - name: Commit and push if changed
        run: |
          git config user.name "5hristian"
          git config user.email "chrxtians@gmail.com"
          git add dark_mode.svg light_mode.svg cache/
          git diff --cached --quiet || (git commit -m "Refresh profile card" && git push)
